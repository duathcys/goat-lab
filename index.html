<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Noise overlay -->
  <div class="noise"></div>

  <!-- Header / Nav -->
  <header class="header">
    <div class="logo">Portfolio</div>
    <nav class="nav">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero" id="about">
    <div class="hero-content">
      <div class="hero-text">
        <p class="hero-label">✦ Hello, I'm</p>
        <h1 class="hero-name"><br/><em></em></h1>
        <p class="hero-desc">
          
        </p>
        <a href="#projects" class="btn-main">프로젝트 보기 →</a>
      </div>
      <div class="hero-image-wrap">
        <div class="hero-image-frame">
          <img src="profile.jpg" alt="Profile" class="hero-image" />
          <div class="frame-deco"></div>
        </div>
        <div class="floating-badge">✦ Open to Work</div>
      </div>
    </div>
    <div class="hero-scroll-hint">scroll ↓</div>
  </section>

  <!-- Projects Section -->
  <section class="projects" id="projects">
    <div class="section-header">
      <span class="section-label">✦ Works</span>
      <h2>Projects</h2>
    </div>
    <div class="project-grid" id="projectGrid">
      <!-- JS로 렌더링 -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <span></span>
    <span></span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
